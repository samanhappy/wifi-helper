name: Publish Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  publish-macos:
    runs-on: macos-14
    env:
      APP_NAME: WiFi Helper
      VERSION: ${{ github.ref_name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.10.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify release version alignment
        run: pnpm release:check

      - name: Verify tag matches app version
        run: |
          VERSION_NO_V="${VERSION#v}"
          PACKAGE_VERSION=$(node -p "require('./package.json').version")

          if [ "$VERSION_NO_V" != "$PACKAGE_VERSION" ]; then
            echo "Tag version $VERSION_NO_V does not match package.json version $PACKAGE_VERSION"
            exit 1
          fi

      - name: Build release bundle
        run: pnpm tauri build

      - name: Normalize release asset names
        run: |
          mv \
            "src-tauri/target/release/bundle/dmg/${APP_NAME}_${VERSION#v}_aarch64.dmg" \
            "src-tauri/target/release/bundle/dmg/${APP_NAME}_${VERSION}_macOS_aarch64.dmg"

      - name: Archive app bundle
        run: |
          ditto -c -k --sequesterRsrc --keepParent \
            "src-tauri/target/release/bundle/macos/${APP_NAME}.app" \
            "src-tauri/target/release/bundle/${APP_NAME}_${VERSION}_macOS_aarch64.zip"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            src-tauri/target/release/bundle/dmg/${{ env.APP_NAME }}_${{ github.ref_name }}_macOS_aarch64.dmg
            src-tauri/target/release/bundle/${{ env.APP_NAME }}_${{ github.ref_name }}_macOS_aarch64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
