name: Publish Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  publish-macos:
    runs-on: macos-14
    env:
      APP_NAME: WiFi Helper
      VERSION: ${{ github.ref_name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.10.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Synchronize app version from tag
        run: pnpm release:sync -- "$VERSION"

      - name: Verify synchronized release version
        run: pnpm release:check -- "$VERSION"

      - name: Import Apple Developer ID certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          if [[ -z "$APPLE_CERTIFICATE" || -z "$APPLE_CERTIFICATE_PASSWORD" || -z "$KEYCHAIN_PASSWORD" ]]; then
            echo "Missing required signing secrets: APPLE_CERTIFICATE, APPLE_CERTIFICATE_PASSWORD, KEYCHAIN_PASSWORD"
            exit 1
          fi

          python3 - <<'PY'
          import base64
          import os
          from pathlib import Path

          Path("certificate.p12").write_bytes(base64.b64decode(os.environ["APPLE_CERTIFICATE"]))
          PY

          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          security find-identity -v -p codesigning build.keychain

      - name: Resolve Apple signing identity
        run: |
          CERT_LINE=$(security find-identity -v -p codesigning build.keychain | grep "Developer ID Application" | head -n 1 || true)

          if [[ -z "$CERT_LINE" ]]; then
            echo "Could not find a 'Developer ID Application' certificate in the temporary keychain."
            exit 1
          fi

          CERT_ID=$(echo "$CERT_LINE" | awk -F'"' '{ print $2 }')
          echo "APPLE_SIGNING_IDENTITY=$CERT_ID" >> "$GITHUB_ENV"
          echo "Using signing identity: $CERT_ID"

      - name: Prepare notarization credentials
        env:
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [[ -n "$APPLE_API_KEY" && -n "$APPLE_API_KEY_ID" && -n "$APPLE_API_ISSUER" ]]; then
            API_KEY_PATH="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"

            if grep -q "BEGIN PRIVATE KEY" <<< "$APPLE_API_KEY"; then
              printf '%s' "$APPLE_API_KEY" > "$API_KEY_PATH"
            else
              APPLE_API_KEY_PATH_TARGET="$API_KEY_PATH" python3 - <<'PY'
              import base64
              import os
              from pathlib import Path

              Path(os.environ["APPLE_API_KEY_PATH_TARGET"]).write_bytes(
                  base64.b64decode(os.environ["APPLE_API_KEY"])
              )
              PY
            fi

            echo "APPLE_API_KEY_PATH=$API_KEY_PATH" >> "$GITHUB_ENV"
            echo "APPLE_API_KEY_ID=$APPLE_API_KEY_ID" >> "$GITHUB_ENV"
            echo "APPLE_API_ISSUER=$APPLE_API_ISSUER" >> "$GITHUB_ENV"
            echo "Using App Store Connect API credentials for notarization."
          elif [[ -n "$APPLE_ID" && -n "$APPLE_PASSWORD" && -n "$APPLE_TEAM_ID" ]]; then
            echo "APPLE_ID=$APPLE_ID" >> "$GITHUB_ENV"
            echo "APPLE_PASSWORD=$APPLE_PASSWORD" >> "$GITHUB_ENV"
            echo "APPLE_TEAM_ID=$APPLE_TEAM_ID" >> "$GITHUB_ENV"
            echo "Using Apple ID credentials for notarization."
          else
            echo "Missing notarization credentials. Configure either APPLE_API_KEY + APPLE_API_KEY_ID + APPLE_API_ISSUER or APPLE_ID + APPLE_PASSWORD + APPLE_TEAM_ID."
            exit 1
          fi

      - name: Build signed release bundle
        run: pnpm tauri build

      - name: Validate signed app bundle
        run: |
          APP_PATH="src-tauri/target/release/bundle/macos/${APP_NAME}.app"

          codesign --verify --deep --strict --verbose=2 "$APP_PATH"
          spctl -a -vv --type exec "$APP_PATH"
          xcrun stapler validate "$APP_PATH"

      - name: Normalize release asset names
        run: |
          mv \
            "src-tauri/target/release/bundle/dmg/${APP_NAME}_${VERSION#v}_aarch64.dmg" \
            "src-tauri/target/release/bundle/dmg/${APP_NAME}_${VERSION}_macOS_aarch64.dmg"

      - name: Validate notarized DMG
        run: |
          DMG_PATH="src-tauri/target/release/bundle/dmg/${APP_NAME}_${VERSION}_macOS_aarch64.dmg"

          spctl -a -vv --type open "$DMG_PATH"
          xcrun stapler validate "$DMG_PATH"

      - name: Archive app bundle
        run: |
          ditto -c -k --sequesterRsrc --keepParent \
            "src-tauri/target/release/bundle/macos/${APP_NAME}.app" \
            "src-tauri/target/release/bundle/${APP_NAME}_${VERSION}_macOS_aarch64.zip"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            src-tauri/target/release/bundle/dmg/${{ env.APP_NAME }}_${{ github.ref_name }}_macOS_aarch64.dmg
            src-tauri/target/release/bundle/${{ env.APP_NAME }}_${{ github.ref_name }}_macOS_aarch64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup temporary signing files
        if: always()
        run: |
          rm -f certificate.p12
          rm -f "$RUNNER_TEMP"/AuthKey_*.p8
          security delete-keychain build.keychain || true
