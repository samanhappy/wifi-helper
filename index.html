<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/src/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WiFi Helper</title>
    <script type="module" src="/src/main.ts" defer></script>
  </head>

  <body>
    <main class="app-shell">
      <section class="topbar">
        <div class="language-switcher" aria-label="Language switcher">
          <button id="lang-zh" type="button" class="lang-button is-active">中文</button>
          <button id="lang-en" type="button" class="lang-button secondary">English</button>
        </div>
      </section>

      <section class="hero card">
        <div>
          <p class="eyebrow" id="eyebrow-text">macOS captive portal assistant</p>
          <h1 id="hero-title">WiFi 助手</h1>
          <p class="hero-copy" id="hero-copy">
            自动检测“已经连上 WiFi 但无法上网”的情况；如果识别到门户登录页，就尝试帮你在默认浏览器中打开它。
          </p>
        </div>
        <div class="hero-side">
          <span class="status-badge" id="status-badge" data-tone="idle">等待首次检测</span>
          <p class="helper-text" id="status-summary">应用启动后会自动开始检测。</p>
        </div>
      </section>

      <section class="grid">
        <article class="card detail-card">
          <h2 id="network-section-title">当前网络</h2>
          <dl class="detail-list">
            <div>
              <dt id="ssid-label">WiFi 名称</dt>
              <dd id="ssid-value">未检测</dd>
            </div>
            <div>
              <dt id="checked-at-label">最近检测</dt>
              <dd id="checked-at-value">尚未检测</dd>
            </div>
            <div>
              <dt id="probe-url-label">探测地址</dt>
              <dd id="probe-url-value">—</dd>
            </div>
          </dl>
        </article>

        <article class="card detail-card">
          <h2 id="portal-section-title">登录入口</h2>
          <p class="helper-text" id="portal-url-value">还没有可打开的门户链接。</p>
          <div class="actions">
            <button id="check-button" type="button">立即检测</button>
            <button id="portal-button" type="button" class="secondary" disabled>
              <span id="portal-button-label">打开登录页</span>
            </button>
          </div>
          <p class="helper-text" id="action-message">
            后台会自动轮询，并在满足条件时只打开一次浏览器，避免“连环弹窗”。
          </p>
        </article>
      </section>

      <section class="card detail-card wide">
        <h2 id="reason-section-title">诊断说明</h2>
        <p class="reason" id="reason-value">
          检测尚未开始。首次检测完成后，这里会显示详细诊断信息。
        </p>
      </section>
    </main>
  </body>
</html>
